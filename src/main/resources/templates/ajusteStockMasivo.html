<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>

    <header th:replace="layout/layout :: header"></header>
    <div th:replace="layout/layout :: alerts"></div>

    <div class="py-4 container-fluid">
        <div class="card bg-light">
            <div class="card-header" th:text="${titulo}"></div>
            <div class="card-body">

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
                </div>

                <form th:action="@{/ajusteStockMasivo}" method="post">
                    <div class="mb-3 d-flex justify-content-between align-items-center">
                        <small class="text-muted">Modificá el stock de cada vino y guardá todo de una vez. Dejá el campo sin cambios si no querés modificar ese vino.</small>
                        <button type="submit" class="btn btn-success px-4">Guardar todo</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover table-sm">
                            <thead class="thead-dark">
                                <tr>
                                    <th>Vino</th>
                                    <th>Bodega</th>
                                    <th>Variedad</th>
                                    <th class="text-center">Stock Actual</th>
                                    <th class="text-center" style="width:140px">Nuevo Stock</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="vino : ${vinos}">
                                    <td th:text="${vino.nombre}"></td>
                                    <td th:text="${vino.bodega != null ? vino.bodega.nombre : '-'}"></td>
                                    <td th:text="${vino.variedad != null ? vino.variedad.nombre : '-'}"></td>
                                    <td class="text-center">
                                        <span class="badge badge-secondary"
                                              th:text="${stockMap[vino.id] != null ? stockMap[vino.id] : 0}">0</span>
                                    </td>
                                    <td class="text-center">
                                        <input type="number"
                                               th:name="'stock_' + ${vino.id}"
                                               th:value="${stockMap[vino.id] != null ? stockMap[vino.id] : 0}"
                                               class="form-control form-control-sm text-center"
                                               min="0" style="width:100px">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-3 text-right">
                        <button type="submit" class="btn btn-success px-4">Guardar todo</button>
                        <a th:href="@{/listarVinos}" class="btn btn-outline-secondary ml-2">Cancelar</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <footer th:replace="layout/layout :: footer"></footer>
</body>
</html>
