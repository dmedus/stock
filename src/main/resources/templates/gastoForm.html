<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
    <meta charset="utf-8">
</head>
<body>

<header th:replace="layout/layout :: header"></header>
<div th:replace="layout/layout :: alerts"></div>

<div class="container py-4">

    <h1 class="mb-4" th:text="${titulo}"></h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/guardarGasto}" th:object="${gasto}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Fecha *</label>
                    <input type="date" class="form-control" th:field="*{fecha}" required>
                </div>

                <div class="form-group">
                    <label>Descripción *</label>
                    <input type="text" class="form-control" th:field="*{descripcion}"
                           placeholder="Descripción del gasto" required maxlength="200">
                </div>

                <div class="form-group">
                    <label>Monto *</label>
                    <input type="number" step="0.01" min="0" class="form-control"
                           th:field="*{monto}" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" class="form-control" th:field="*{categoria}"
                           placeholder="Ej: Flete, Alquiler, Servicios..." maxlength="100">
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/listarGastos" class="btn btn-secondary ml-2">Cancelar</a>
            </form>
        </div>
    </div>

</div>

<footer th:replace="layout/layout :: footer"></footer>
</body>
</html>
